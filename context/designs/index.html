  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

8D8D2;\n  --text:#121212;\n  --t2:#676760;\n  --muted:#8F8F88;\n  --success:#14AE5C;\n  --dark:#0A0A0A;\n}\nhtml{scroll-behavior:smooth}\nbody{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}\nimg{display:block;max-width:100%}\n\n/* PAGES */\n.page{display:none}\n.page.active{display:block}\n\n/* NAV */\n.nav{\n  position:sticky;top:0;z-index:999;\n  background:rgba(255,251,240,0.96);\n  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);\n  border-bottom:1px solid var(--border);\n  padding:0 20px;height:60px;\n  display:flex;align-items:center;justify-content:space-between;\n}\n.logo{font-size:24px;font-weight:900;letter-spacing:3px;cursor:pointer;color:var(--text);text-decoration:none}\n.logo em{color:var(--blue);font-style:normal}\n.nav-right{display:flex;align-items:center;gap:10px}\n.nav-search{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .15s}\n.nav-search:hover{border-color:var(--blue);background:var(--blue-s)}\n.nav-cart{background:var(--blue);color:white;border:none;border-radius:22px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;font-family:'Inter',sans-serif}\n.nav-cart:hover{background:var(--blue-h);transform:scale(1.03)}\n.c-badge{background:white;color:var(--blue);border-radius:999px;padding:1px 7px;font-size:11px;font-weight:800;min-width:18px;text-align:center}\n\n/* HERO */\n.hero{\n  min-height:72vh;\n  position:relative;\n  overflow:hidden;\n  display:flex;flex-direction:column;justify-content:flex-end;\n}\n.hero-bg{position:absolute;inset:0;background:linear-gradient(145deg,#000d1a 0%,#001f4d 45%,#004AAD 100%)}\n.hero-imgs{\n  position:absolute;inset:0;\n  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;\n  gap:2px;opacity:0.28;\n}\n.hero-imgs img{width:100%;height:100%;object-fit:cover;object-position:top}\n.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.97) 0%,rgba(0,0,0,0.5) 40%,rgba(0,0,20,0.2) 100%)}\n\n/* blue glow */\n.hero-glow{position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,74,173,0.4) 0%,transparent 70%);pointer-events:none}\n\n.hero-content{position:relative;z-index:2;padding:0 22px 44px}\n\n.hero-live{\n  display:inline-flex;align-items:center;gap:8px;\n  background:rgba(0,74,173,0.25);\n  border:1px solid rgba(0,74,173,0.5);\n  color:#7BB8FF;\n  padding:6px 14px;border-radius:999px;\n  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;\n  margin-bottom:20px;\n  opacity:0;\n}\n.live-dot{width:7px;height:7px;border-radius:50%;background:#14AE5C;animation:liveblink 1.4s infinite}\n@keyframes liveblink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(20,174,92,0.4)}50%{opacity:.4;box-shadow:0 0 0 4px rgba(20,174,92,0)}}\n\n.hero-title{\n  font-size:clamp(38px,11vw,64px);\n  font-weight:900;color:white;line-height:1.03;\n  margin-bottom:16px;opacity:0;\n}\n.hero-title em{\n  color:transparent;\n  font-style:normal;\n  -webkit-text-stroke:2px #5BA3FF;\n}\n\n.hero-sub{font-size:15px;color:rgba(255,255,255,0.55);line-height:1.7;margin-bottom:28px;max-width:320px;opacity:0}\n\n.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:40px;opacity:0}\n\n.btn-p{\n  background:var(--white);color:var(--blue);\n  border:none;border-radius:14px;padding:13px 24px;\n  font-size:14px;font-weight:800;cursor:pointer;\n  transition:all .2s;font-family:'Inter',sans-serif;\n  box-shadow:0 4px 20px rgba(0,0,0,0.3);\n}\n.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.4)}\n.btn-o{\n  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);\n  border:1.5px solid rgba(255,255,255,0.25);border-radius:14px;padding:13px 24px;\n  font-size:14px;font-weight:600;cursor:pointer;\n  transition:all .2s;font-family:'Inter',sans-serif;\n}\n.btn-o:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.5)}\n\n.hero-stats{display:flex;gap:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.1);opacity:0}\n.h-stat-n{font-size:24px;font-weight:900;color:white;line-height:1}\n.h-stat-l{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;font-weight:500}\n\n/* MARQUEE */\n.mq-wrap{background:var(--blue);padding:14px 0;overflow:hidden}\n.mq-track{display:flex;animation:mq 22s linear infinite;white-space:nowrap}\n.mq-item{display:inline-flex;align-items:center;gap:18px;padding:0 18px;color:rgba(255,255,255,0.85);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;flex-shrink:0}\n.mq-sep{color:rgba(255,255,255,0.3);font-size:18px;line-height:1}\n@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n\n/* SECTIONS */\n.sec{padding:40px 20px}\n.sec-lbl{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:6px}\n.sec-ttl{font-size:24px;font-weight:900;color:var(--text);line-height:1.15}\n.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px}\n.see-all{font-size:13px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;white-space:nowrap;padding:4px 0;font-family:'Inter',sans-serif;flex-shrink:0;margin-top:4px}\n.see-all:hover{text-decoration:underline}\n\n/* CATEGORY PILLS */\n.cat-row{display:flex;gap:8px;overflow-x:auto;padding:0 20px 20px;scrollbar-width:none}\n.cat-row::-webkit-scrollbar{display:none}\n.cat-pill{flex-shrink:0;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--t2);transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}\n.cat-pill.on,.cat-pill:hover{background:var(--blue);color:white;border-color:var(--blue)}\n\n/* BRAND CARDS */\n.brands-g{display:grid;grid-template-columns:1fr 1fr;gap:12px}\n.brands-g .bc:first-child{grid-column:1/-1;aspect-ratio:16/8}\n.bc{border-radius:18px;overflow:hidden;position:relative;cursor:pointer;aspect-ratio:3/4;transition:transform .22s}\n.bc:active{transform:scale(0.97)}\n.bc img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .5s}\n.bc:hover img{transform:scale(1.07)}\n.bc-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.15) 55%,rgba(0,0,0,0) 100%)}\n.bc-info{position:absolute;bottom:0;left:0;right:0;padding:16px}\n.bc-tag{display:inline-block;background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);color:rgba(255,255,255,0.9);font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1px solid rgba(255,255,255,0.2);margin-bottom:6px}\n.bc-name{font-size:22px;font-weight:900;color:white;line-height:1;margin-bottom:3px}\n.bc-cnt{font-size:12px;color:rgba(255,255,255,0.55);font-weight:500}\n.bc-arr{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--blue);font-weight:900;transition:all .15s}\n.bc:hover .bc-arr{background:var(--blue);color:white;transform:scale(1.1)}\n\n/* PRODUCT GRID */\n.p-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}\n.pc{background:var(--white);border-radius:16px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all .2s}\n.pc:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,0.1);border-color:transparent}\n.pc:active{transform:scale(0.98)}\n.pi{aspect-ratio:1;overflow:hidden;background:var(--s2);position:relative}\n.pi img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .4s}\n.pc:hover .pi img{transform:scale(1.07)}\n.p-bdg{position:absolute;top:8px;left:8px;padding:3px 9px;border-radius:999px;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;z-index:1}\n.bh{background:#E5484D;color:white}\n.bn{background:var(--blue);color:white}\n.bs{background:var(--success);color:white}\n.wb{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:white;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:transform .15s;z-index:1}\n.wb:active{transform:scale(1.3)}\n.pb{padding:12px}\n.p-brand{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}\n.p-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:35px}\n.p-row{display:flex;align-items:flex-end;justify-content:space-between;gap:4px}\n.p-price{font-size:14px;font-weight:900;color:var(--text)}\n.p-dlv{font-size:10px;color:var(--muted);margin-top:1px}\n.add-b{background:var(--blue-s);color:var(--blue);border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0}\n.add-b:hover{background:var(--blue);color:white}\n.add-b:active{transform:scale(0.95)}\n\n/* PROMO BANNER */\n.promo{\n  margin:4px 20px 40px;\n  border-radius:22px;overflow:hidden;\n  position:relative;min-height:220px;\n  display:flex;align-items:flex-end;\n}\n.promo-bg2{position:absolute;inset:0;background:linear-gradient(135deg,#001d45 0%,#003d8f 50%,#004AAD 100%)}\n.promo-ptrn{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.07) 1px,transparent 1px);background-size:18px 18px}\n.promo-img{position:absolute;right:0;bottom:0;height:100%;width:42%;object-fit:cover;object-position:top center}\n.promo-fade{position:absolute;right:35%;top:0;bottom:0;width:60px;background:linear-gradient(to right,transparent,#003d8f)}\n.promo-c{position:relative;z-index:2;padding:24px}\n.promo-ey{font-size:9px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px}\n.promo-hl{font-size:26px;font-weight:900;color:white;line-height:1.1;margin-bottom:16px}\n.promo-hl em{color:#5BA3FF;font-style:normal}\n.promo-btn{background:white;color:var(--blue);border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}\n.promo-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}\n\n/* HOW IT WORKS */\n.steps-list{display:flex;flex-direction:column;gap:0}\n.step-r{display:flex;gap:16px;padding:18px 0;border-bottom:1px solid var(--border);align-items:flex-start}\n.step-r:last-child{border-bottom:none}\n.step-ico{width:46px;height:46px;border-radius:13px;background:var(--blue-s);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}\n.step-t{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}\n.step-d{font-size:13px;color:var(--t2);line-height:1.55}\n\n/* ALL BRANDS PAGE */\n.pg-hdr{position:relative;overflow:hidden;padding:44px 20px 32px;min-height:180px;display:flex;flex-direction:column;justify-content:flex-end}\n.pg-hdr-bg{position:absolute;inset:0;background:linear-gradient(145deg,#000d1a 0%,#004AAD 100%)}\n.pg-hdr-img{position:absolute;inset:0;object-fit:cover;object-position:center;opacity:.18;width:100%;height:100%}\n.pg-hdr-c{position:relative;z-index:1}\n.back-b{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;margin-bottom:12px;padding:0;font-family:'Inter',sans-serif;transition:color .15s}\n.back-b:hover{color:white}\n.pg-ttl{font-size:30px;font-weight:900;color:white;margin-bottom:4px}\n.pg-sub{font-size:14px;color:rgba(255,255,255,0.5);font-weight:500}\n\n.brands-all{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}\n.bca{border-radius:16px;overflow:hidden;position:relative;cursor:pointer;aspect-ratio:3/4;transition:transform .2s}\n.bca:active{transform:scale(0.97)}\n.bca img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform .5s}\n.bca:hover img{transform:scale(1.07)}\n.bca-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.1) 60%,transparent 100%)}\n.bca-info{position:absolute;bottom:0;left:0;right:0;padding:14px}\n.bca-tag{display:inline-block;background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);color:rgba(255,255,255,0.9);font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,0.2);margin-bottom:5px}\n.bca-name{display:block;font-size:18px;font-weight:900;color:white;line-height:1;margin-bottom:3px}\n.bca-cnt{display:block;font-size:11px;color:rgba(255,255,255,0.55);font-weight:500}\n\n/* BRAND DETAIL PAGE */\n.b-hero{position:relative;height:260px;overflow:hidden}\n.b-hero img{width:100%;height:100%;object-fit:cover;object-position:top center}\n.b-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.3) 55%,rgba(0,0,0,0) 100%)}\n.b-hero-c{position:absolute;bottom:0;left:0;right:0;padding:20px}\n.b-hero-n{font-size:34px;font-weight:900;color:white;margin-bottom:4px;line-height:1}\n.b-hero-s{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:14px;font-weight:500}\n.b-stats{display:flex;gap:24px}\n.b-st-n{font-size:19px;font-weight:900;color:white;line-height:1}\n.b-st-l{font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;font-weight:500}\n\n/* CART DRAWER */\n.cart-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9998;display:none;backdrop-filter:blur(6px)}\n.cart-ov.on{display:block}\n.cart-dr{\n  position:fixed;bottom:0;left:0;right:0;\n  background:white;border-radius:24px 24px 0 0;\n  z-index:9999;padding:20px 20px 44px;\n  transform:translateY(100%);\n  transition:transform .35s cubic-bezier(0.32,0.72,0,1);\n  max-height:82vh;overflow-y:auto;\n}\n.cart-dr.on{transform:translateY(0)}\n.cart-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}\n.cart-ttl{font-size:20px;font-weight:900;color:var(--text);margin-bottom:18px}\n.cart-empty-w{text-align:center;padding:36px 0;color:var(--muted)}\n.ce-icon{font-size:44px;margin-bottom:10px}\n.ce-t{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px}\n.ce-s{font-size:12px;color:var(--muted)}\n.cart-itm{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);align-items:center}\n.ci-img{width:60px;height:60px;border-radius:10px;object-fit:cover;background:var(--s2);flex-shrink:0}\n.ci-n{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}\n.ci-b{font-size:11px;color:var(--blue);font-weight:700}\n.ci-p{font-size:14px;font-weight:900;color:var(--text);margin-left:auto;flex-shrink:0}\n.ci-rm{font-size:20px;color:var(--muted);cursor:pointer;border:none;background:none;padding:4px;line-height:1;transition:color .15s}\n.ci-rm:hover{color:#E5484D}\n.cart-tot-row{display:flex;justify-content:space-between;align-items:center;padding:18px 0 14px}\n.ct-lbl{font-size:13px;color:var(--t2);font-weight:600}\n.ct-amt{font-size:22px;font-weight:900;color:var(--text)}\n.ck-btn{width:100%;background:var(--blue);color:white;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}\n.ck-btn:hover{background:var(--blue-h);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,74,173,0.35)}\n\n/* TOAST */\n.toast{\n  position:fixed;bottom:24px;left:50%;\n  transform:translateX(-50%) translateY(80px);\n  background:var(--text);color:white;\n  padding:12px 20px; {n:'H&M',s:'Fashion & Quality at the Best Price',c:'2,100+',i:'https://images.pexels.com/photos/934070/pexels-photo-934070.jpeg?auto=compress&cs=tinysrgb&w=600',p:[\n    {n:'Cotton Jersey Wrap Dress',pr:'₦35,200',pn:35200,b:'bs',bt:'Sale',i:'https://images.pexels.com/photos/1055691/pexels-photo-1055691.jpeg?auto=compress&cs=tinysrgb&w=600'},\n    {n:'Slim-fit Chino Trousers',pr:'₦48,000',pn:48000,b:'bn',bt:'New',i:'https://images.pexels.com/photos/934070/pexels-photo-934070.jpeg?auto=compress&cs=tinysrgb&w=600'},\n    {n:'Oversized Knit Hoodie',pr:'₦56,000',pn:56000,b:'bh',bt:'🔥 Hot',i:'https://images.pexels.com/photos/1536619/pexels-photo-1536619.jpeg?auto=compress&cs=tinysrgb&w=600'},\n  ]},\n};\n\n// CART\nlet cart=[],cartSum=0;\n\nfunction addC(e,n,br,pr,pn,img){\n  if(e)e.stopPropagation();\n  cart.push({n,br,pr,pn,img,id:Date.now()});\n  cartSum+=pn;\n  updateCart();\n  toast('✅ '+n+' added to cart');\n  const btn=e?e.target:null;\n  if(btn){\n    const orig=btn.textContent;\n    btn.textContent='✓ Added';\n    btn.style.background='var(--success)';\n    btn.style.color='white';\n    setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color=''},1500);\n  }\n}\n\nfunction updateCart(){\n  const n=cart.length;\n  document.querySelectorAll('[id^=\"cc\"]').forEach(el=>el.textContent=n);\n  if(!n){\n    document.getElementById('c-items').innerHTML='<div class=\"cart-empty-w\"><div class=\"ce-icon\">🛍️<\u002Fdiv><div class=\"ce-t\">Your cart is empty<\u002Fdiv><div class=\"ce-s\">Browse brands to find something you love<\u002Fdiv><\u002Fdiv>';\n    document.getElementById('c-foot').style.display='none';\n  }else{\n    document.getElementById('c-items').innerHTML=cart.map(it=>`<div class=\"cart-itm\"><img class=\"ci-img\" src=\"${it.img}\" alt=\"\" onerror=\"this.style.display='none'\"><div><div class=\"ci-n\">${it.n}<\u002Fdiv><div class=\"ci-b\">${it.br}<\u002Fdiv><\u002Fdiv><div class=\"ci-p\">${it.pr}<\u002Fdiv><button class=\"ci-rm\" onclick=\"rmC(${it.id})\">×<\u002Fbutton><\u002Fdiv>`).join('');\n    document.getElementById('c-tot').textContent='₦'+cartSum.toLocaleString();\n    document.getElementById('c-foot').style.display='block';\n  }\n}\n\nfunction rmC(id){\n  const i=cart.findIndex(x=>x.id===id);\n  if(i>-1){cartSum-=cart[i].pn;cart.splice(i,1)}\n  updateCart();\n}\n\nfunction openCart(){\n  document.getElementById('cov').classList.add('on');\n  document.getElementById('cdr').classList.add('on');\n}\nfunction closeCart(){\n  document.getElementById('cov').classList.remove('on');\n  document.getElementById('cdr').classList.remove('on');\n}\n\n// NAV\nfunction showPage(id){\n  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n  window.scrollTo({top:0,behavior:'instant'});\n  setTimeout(()=>initAnimations(),50);\n}\n\nfunction goHome(){showPage('ph')}\nfunction goToBrands(){showPage('pb')}\nfunction goToBrand(k){\n  const b=brands[k];if(!b)return;\n  document.getElementById('bhi').src=b.i;\n  document.getElementById('bhi').style.display='';\n  document.getElementById('bhn').textContent=b.n;\n  document.getElementById('bhs').textContent=b.s;\n  document.getElementById('bpc').textContent=b.c;\n  document.getElementById('bprods').innerHTML=b.p.map((p,i)=>`\n    <div class=\"pc\" onclick=\"openProduct('${k}',${i})\">\n      <div class=\"pi\">\n        <img src=\"${p.i}\" alt=\"${p.n}\" loading=\"lazy\" onerror=\"this.style.display='none'\">\n        <span class=\"p-bdg ${p.b}\">${p.bt}<\u002Fspan>\n        <button class=\"wb\" onclick=\"wish(event)\">♡<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"pb\">\n        <div class=\"p-brand\">${b.n}<\u002Fdiv>\n        <div class=\"p-name\">${p.n}<\u002Fdiv>\n        <div class=\"p-row\">\n          <div><div class=\"p-price\">${p.pr}<\u002Fdiv><div class=\"p-dlv\">+ KOI delivery<\u002Fdiv><\u002Fdiv>\n          <button class=\"add-b\" onclick=\"addC(event,'${p.n.replace(/'/g,\"\\\\'\")}','${b.n.replace(/'/g,\"\\\\'\")}','${p.pr}',${p.pn},'${p.i}')\">+ Add<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n  showPage('pd');\n  // animate products in\n  setTimeout(()=>{\n    gsap.from('#bprods .pc',{opacity:0,y:30,stagger:0.08,duration:0.5,ease:'power2.out'});\n  },100);\n}\n\nfunction scrollHow(){document.getElementById('how-sec').scrollIntoView({behavior:'smooth'})}\n\n/* ═══ PRODUCT DETAIL PAGE ═══ */\nlet curP=null, lastPageId='ph';\n\nfunction productType(name){\n  const n=name.toLowerCase();\n  if(/sneaker|shoe|air |air$|force|jordan|ultraboost|stan smith|react|ace |runner|running/.test(n))return 'shoe';\n  if(/dress|trouser|blazer|skirt|hoodie|pants|chino|shorts|knit|jersey|track|blouse|shirt|jacket/.test(n))return 'apparel';\n  return 'one';\n}\nfunction sizesFor(type){\n  if(type==='shoe')return ['UK 6','UK 7','UK 8','UK 9','UK 10','UK 11','UK 12'];\n  if(type==='apparel')return ['XS','S','M','L','XL'];\n  return null;\n}\nconst COLORS={\n  shoe:[{n:'Black',h:'#1a1a1a'},{n:'White',h:'#f2f2ec'},{n:'Grey',h:'#9a9a92'},{n:'Royal Blue',h:'#004AAD'}],\n  apparel:[{n:'Black',h:'#1a1a1a'},{n:'Ecru',h:'#e6ddc8'},{n:'Olive',h:'#5d6544'},{n:'Navy',h:'#1e2a44'}],\n  one:[{n:'As shown',h:'#004AAD'},{n:'Alt shade',h:'#c8b08a'}],\n};\nfunction descFor(p,brandName,type){\n  if(type==='shoe')return `Authentic ${brandName} ${p.n.toLowerCase()}, sourced brand-new directly from ${brandName}. Engineered for all-day comfort with premium cushioning and a durable outsole. Sourced from the official ${brandName} store and delivered to your door in Nigeria — no dollar card, no customs stress.`;\n  if(type==='apparel')return `${brandName}'s ${p.n.toLowerCase()} in a modern, versatile cut. Made from quality fabric with a comfortable fit that carries you from day to night. Sourced brand-new from ${brandName} and delivered to your door in Nigeria — pay entirely in naira.`;\n  return `Genuine ${brandName} ${p.n}, sourced brand-new directly from ${brandName}. A cult-favourite loved worldwide, now available to order in Nigeria and pay in naira. KOI handles the buying, international shipping, and doorstep delivery.`;\n}\nconst FEATS=['100% authentic — sourced from the official brand','Pay in naira via Paystack, no dollar card needed','Delivered to your door in 7–14 days','Price includes product, shipping &amp; KOI delivery'];\n\nfunction openProduct(bk,idx){\n  const b=brands[bk]; if(!b)return;\n  const p=b.p[idx]; if(!p)return;\n  const type=productType(p.n);\n  curP={bk,idx,p,brandName:b.n,size:null,color:0,qty:1};\n\n  document.getElementById('pp-img').src=p.i;\n  document.getElementById('pp-img').style.display='';\n  const bdg=document.getElementById('pp-bdg');\n  bdg.className='pdp-bdg '+p.b; bdg.textContent=p.bt;\n  document.getElementById('pp-brand').textContent=b.n;\n  document.getElementById('pp-title').textContent=p.n;\n  document.getElementById('pp-price').textContent=p.pr;\n  const old=document.getElementById('pp-old');\n  if(p.b==='bs'){old.textContent='₦'+Math.round(p.pn*1.4).toLocaleString();old.style.display=''}\n  else old.style.display='none';\n  document.getElementById('pp-wish').textContent='♡';\n  document.getElementById('pp-wish').style.color='';\n\n  // sizes\n  const szBlock=document.getElementById('pp-size-block');\n  const sizes=sizesFor(type);\n  if(sizes){\n    szBlock.style.display='';\n    document.getElementById('pp-sizes').innerHTML=sizes.map(s=>`<div class=\"size-chip\" onclick=\"pickSize(this,'${s}')\">${s}<\u002Fdiv>`).join('');\n    document.getElementById('pp-size-sel').textContent='—';\n  }else{\n    szBlock.style.display='none';\n  }\n\n  // colors\n  const cols=COLORS[type];\n  document.getElementById('pp-colors').innerHTML=cols.map((c,i)=>`<div class=\"color-opt${i===0?' on':''}\" onclick=\"pickColor(this,${i},'${c.n}')\"><div class=\"color-dot\" style=\"background:${c.h}\"><\u002Fdiv><div class=\"color-nm\">${c.n}<\u002Fdiv><\u002Fdiv>`).join('');\n  document.getElementById('pp-color-sel').textContent=cols[0].n;\n\n  // desc + feats\n  document.getElementById('pp-desc').textContent=descFor(p,b.n,type);\n  document.getElementById('pp-feats').innerHTML=FEATS.map(f=>`<div class=\"pdp-feat\"><span>✓<\u002Fspan><div>${f}<\u002Fdiv><\u002Fdiv>`).join('');\n\n  // qty + bar\n  curP.qty=1;\n  document.getElementById('pp-qty').textContent='1';\n  document.getElementById('pp-qty-d').textContent='1';\n  updateBarPrice();\n\n  // you might also like\n  buildYML(bk,idx);\n\n  lastPageId=document.querySelector('.page.active')?.id||'ph';\n  showPage('pp');\n  setTimeout(()=>gsap.from('.pdp-body > *, #pp-yml .pc',{opacity:0,y:24,stagger:0.05,duration:0.45,ease:'power2.out'}),80);\n}\n\nfunction buildYML(bk,idx){\n  const pool=[];\n  brands[bk].p.forEach((p,i)=>{if(i!==idx)pool.push({bk,i,p,bn:brands[bk].n})});\n  if(pool.length<4){\n    Object.keys(brands).forEach(k=>{if(k!==bk)brands[k].p.forEach((p,i)=>pool.push({bk:k,i,p,bn:brands[k].n}))});\n  }\n  const pick=pool.slice(0,4);\n  document.getElementById('pp-yml').innerHTML=pick.map(x=>`\n    <div class=\"pc\" onclick=\"openProduct('${x.bk}',${x.i})\">\n      <div class=\"pi\">\n        <img src=\"${x.p.i}\" alt=\"${x.p.n}\" loading=\"lazy\" onerror=\"this.style.display='none'\">\n        <span class=\"p-bdg ${x.p.b}\">${x.p.bt}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pb\">\n        <div class=\"p-brand\">${x.bn}<\u002Fdiv>\n        <div class=\"p-name\">${x.p.n}<\u002Fdiv>\n        <div class=\"p-row\"><div><div class=\"p-price\">${x.p.pr}<\u002Fdiv><div class=\"p-dlv\">+ KOI delivery<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\nfunction pickSize(el,s){\n  el.parentElement.querySelectorAll('.size-chip').forEach(c=>c.classList.remove('on'));\n  el.classList.add('on');\n  curP.size=s;\n  document.getElementById('pp-size-sel').textContent=s;\n}\nfunction pickColor(el,i,name){\n  el.parentElement.querySelectorAll('.color-opt').forEach(c=>c.classList.remove('on'));\n  el.classList.add('on');\n  curP.color=i;\n  document.getElementById('pp-color-sel').textContent=name;\n}\nfunction ppQty(d){\n  curP.qty=Math.max(1,curP.qty+d);\n  document.getElementById('pp-qty').textContent=curP.qty;\n  document.getElementById('pp-qty-d').textContent=curP.qty;\n  updateBarPrice();\n}\nfunction updateBarPrice(){\n  const v='₦'+(curP.p.pn*curP.qty).toLocaleString();\n  document.getElementById('pp-bar-price').textContent=v;\n  const d=document.getElementById('pp-bar-price-d');if(d)d.textContent=v;\n}\nfunction ppAdd(){\n  const type=productType(curP.p.n);\n  if(sizesFor(type)&&!curP.size){toast('👆 Please select a size');return}\n  const colName=COLORS[type][curP.color].n;\n  const opts=[curP.size,colName].filter(Boolean).join(' · ');\n  for(let q=0;q<curP.qty;q++){\n    cart.push({n:curP.p.n+(opts?' ('+opts+')':''),br:curP.brandName,pr:curP.p.pr,pn:curP.p.pn,img:curP.p.i,id:Date.now()+q});\n    cartSum+=curP.p.pn;\n  }\n  updateCart();\n  toast('✅ Added to cart — opening cart');\n  setTimeout(openCart,400);\n}\nfunction backFromProduct(){showPage(lastPageId||'ph')}\n\n// WISH\nfunction wish(e){\n  e.stopPropagation();\n  const btn=e.target;\n  if(btn.textContent==='♡'){btn.textContent='❤️';btn.style.color='#E5484D'}\n  else{btn.textContent='♡';btn.style.color=''}\n}\n\n// TOAST\nfunction toast(msg){\n  const t=document.getElementById('toast');\n  t.textContent=msg;t.classList.add('on');\n  setTimeout(()=>t.classList.remove('on'),2500);\n}\n\n// CATEGORY PILLS\ndocument.addEventListener('click',function(e){\n  if(e.target.classList.contains('cat-pill')){\n    const row=e.target.closest('.cat-row');\n    if(row)row.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('on'));\n    e.target.classList.add('on');\n  }\n});\n\n// GSAP ANIMATIONS\nfunction initAnimations(){\n  document.body.classList.add('gsap-ready');\n\n  const live=document.getElementById('h-live');\n  const ttl=document.getElementById('h-ttl');\n  const sub=document.getElementById('h-sub');\n  const btns=document.getElementById('h-btns');\n  const stats=document.getElementById('h-stats');\n  if(live&&ttl){\n    gsap.timeline({delay:0.2})\n      .to(live,{opacity:1,y:0,duration:.5,ease:'power2.out'})\n      .to(ttl,{opacity:1,y:0,duration:.6,ease:'power2.out'},'-=.2')\n      .to(sub,{opacity:1,y:0,duration:.5,ease:'power2.out'},'-=.3')\n      .to(btns,{opacity:1,y:0,duration:.5,ease:'power2.out'},'-=.2')\n      .to(stats,{opacity:1,y:0,duration:.5,ease:'power2.out'},'-=.2');\n  }\n\n  ScrollTrigger.getAll().forEach(t=>t.kill());\n\n  document.querySelectorAll('.gs-fade').forEach((el,i)=>{\n    const fallback = setTimeout(()=>gsap.set(el,{opacity:1,y:0}), 1000 + i*50);\n    ScrollTrigger.create({\n      trigger:el, start:'top 95%',\n      onEnter:()=>{clearTimeout(fallback);gsap.to(el,{opacity:1,y:0,duration:.55,delay:i*0.07,ease:'power2.out'})}\n    });\n  });\n\n  document.querySelectorAll('.gs-scale').forEach((el,i)=>{\n    const fallback = setTimeout(()=>gsap.set(el,{opacity:1,scale:1}), 1000 + i*50);\n    ScrollTrigger.create({\n      trigger:el, start:'top 95%',\n      onEnter:()=>{clearTimeout(fallback);gsap.to(el,{opacity:1,scale:1,duration:.5,delay:i*0.07,ease:'back.out(1.4)'})}\n    });\n  });\n\n  document.querySelectorAll('.gs-left').forEach((el,i)=>{\n    const fallback = setTimeout(()=>gsap.set(el,{opacity:1,x:0}), 1000 + i*80);\n    ScrollTrigger.create({\n      trigger:el, start:'top 95%',\n      onEnter:()=>{clearTimeout(fallback);gsap.to(el,{opacity:1,x:0,duration:.55,delay:i*0.08,ease:'power2.out'})}\n    });\n  });\n}\n\n// DESKTOP NAV MENU — inject into every nav\n(function(){\n  const items=[['Home',\"goHome()\"],['Brands',\"goToBrands()\"],['How it works',\"goHome();setTimeout(scrollHow,60)\"]];\n  document.querySelectorAll('.nav').forEach(nav=>{\n    if(nav.querySelector('.nav-menu'))return;\n    const menu=document.createElement('div');\n    menu.className='nav-menu';\n    items.forEach(([label,fn])=>{\n      const b=document.createElement('button');\n      b.className='nav-lnk';b.textContent=label;\n      b.setAttribute('onclick',fn);\n      menu.appendChild(b);\n    });\n    nav.insertBefore(menu,nav.querySelector('.nav-right'));\n  });\n})();\n\n// INIT\nwindow.addEventListener('load',()=>{\n  initAnimations();\n  const promo=document.querySelector('.promo');\n  if(promo){\n    ScrollTrigger.create({\n      trigger:promo,start:'top bottom',end:'bottom top',\n      onUpdate:(self)=>{\n        const img=promo.querySelector('.promo-img');\n        if(img)gsap.set(img,{y:self.progress*-40});\n      }\n    });\n  }\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
